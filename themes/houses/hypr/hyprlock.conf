############################
# PASSWORD
############################

input-field {
    monitor =
    size = 225, 36
    position = 0, -140
    halign = center
    valign = center
    outline_thickness = 2

    rounding = 5
    outer_color = rgba(234, 105, 98, 1)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(234, 105, 98, 1)

    font_family = SF Pro Text
    placeholder_text = Digite sua senha
    dots_size = 0.25
    dots_spacing = 0.4
    fade_on_empty = true
}

