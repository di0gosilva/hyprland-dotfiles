general {
    hide_cursor = false
    grace = 0
}

background {
    monitor = 
    path = ~/Documentos/dotfiles/wallpapers/houses.png
    blur_passes = 2
    blur_size = 1
}

############################
# RELÓGIO
############################

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    font_family = SF Pro Text Bold
    font_size = 112
    color = rgba(234, 105, 98, 1)
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%d/%m/%Y"
    font_family = SF Pro Text Bold
    font_size = 22
    color = rgba(234, 105, 98, 1)
    position = 0, -42
    halign = center
    valign = center
}

